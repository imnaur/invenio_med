{% extends 'pages/base.html' %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}
<div class="container" style="margin-top: 100px !important;">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-4 rounded shadow-sm">
            <h2 class="mb-4 text-center">{% trans "Регистрация" %}</h2>

            <form method="post">
                {% csrf_token %}

                {% crispy form %}
            </form>
            <a href="{% url 'users:login' %}" class="d-block mt-3 mb-2">{% trans "У меня уже есть аккаунт" %}</a>
        </div>
    </div>
</div>
{% endblock %}
