{% extends 'pages/base.html' %}
{% load static %}
{% load i18n %}

{% block title %}{% trans "Редактирование услуги" %}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4">{% trans "Редактирование услуги" %}</h3>

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="form-group">
                            {{ form.as_p }}
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'catalog:service_detail' service.pk %}" class="btn btn-outline-danger">{% trans "Отмена" %}</a>
                            <button type="submit" class="btn btn-primary">{% trans "Сохранить изменения" %}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
