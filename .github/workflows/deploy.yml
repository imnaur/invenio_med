name: CI & CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '2.0.1'

      - name: Install Lint dependencies
        run: poetry install --no-root

      - name: Run Flake8
        run: poetry run flake8 .

  run_tests:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'poetry'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '2.0.1'

      - name: Install Python Dependencies
        run: poetry install --no-root

      - name: Testing whole code
        env:
          PYTHONPATH: .
          SECRET_KEY: "super-secret-key-for-testing-purposes-only"
          DB_NAME: "test_db"

          HOST: "127.0.0.1"
          PORT: "5432"

          DB_HOST: "127.0.0.1"
          DB_PORT: "5432"

          POSTGRES_HOST: "127.0.0.1"
          POSTGRES_PORT: "5432"

          DATABASE_HOST: "127.0.0.1"
          DATABASE_PORT: "5432"

          DB_USER: "postgres"
          DB_PASSWORD: "postgres"
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "postgres"
        run: poetry run python backend/manage.py test

  deploy_to_server:
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Connection with SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/django_drf
            git pull origin main
            docker compose down
            docker compose up --build -d